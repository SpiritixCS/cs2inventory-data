name: Fetch CSFloat snapshot

# Runs at :37 past each hour (offset from Skinport's :07 to spread load)
# Can also be triggered manually from the Actions tab.
on:
  schedule:
    - cron: '37 * * * *'
  workflow_dispatch:

# Needs write access to push the updated JSON back to the repo
permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch CSFloat prices
        run: node fetch-csfloat.mjs
        env:
          CSFLOAT_API_KEY: ${{ secrets.CSFLOAT_API_KEY }}

      - name: Commit updated snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add csfloat-cs2.json
          if git diff --staged --quiet; then
            echo "No price changes — skipping commit."
          else
            git commit -m "csfloat snapshot $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
